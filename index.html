<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive JavaScript</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-gray-100 to-gray-200 font-sans">

<div class="max-w-5xl mx-auto p-6 md:p-10 space-y-6">

    <!-- Info -->
    <div class="bg-gradient-to-r from-purple-100 to-purple-200 shadow-lg rounded-2xl p-6 text-gray-800">
        <h2 class="font-bold text-xl md:text-2xl mb-1">Name: INGABIRE SANDRINE</h2>
        <h3 class="text-gray-700">Reg No: 25RP01322</h3>
    </div>

    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-600 to-indigo-500 text-white p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center shadow-xl">
        <h1 id="mainTitle" class="text-2xl md:text-3xl font-extrabold tracking-wide">
            My JavaScript Practice Page
        </h1>
        <button id="modifyTitle"
            class="mt-4 md:mt-0 bg-white text-indigo-600 font-semibold hover:bg-gray-100 px-5 py-2 rounded-xl shadow-md transition-all">
            Update Title
        </button>
    </header>

    <!-- Button Interaction -->
    <section class="bg-white shadow-lg rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4 text-indigo-600">Button Interaction</h2>

        <button id="pressBtn"
            class="bg-green-500 hover:bg-green-600 text-white font-medium px-6 py-2 rounded-xl shadow transition-all">
            Press Me
        </button>

        <p id="feedback" class="mt-4 text-gray-700 italic"></p>
    </section>

    <!-- Calculator -->
    <section class="bg-white shadow-lg rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4 text-indigo-600">Math Tool</h2>

        <div class="flex flex-col md:flex-row gap-4 mb-5">
            <input type="number" id="firstValue"
                class="border border-gray-300 p-3 rounded-xl w-full md:w-1/2 focus:ring-2 focus:ring-indigo-400"
                placeholder="First number">

            <input type="number" id="secondValue"
                class="border border-gray-300 p-3 rounded-xl w-full md:w-1/2 focus:ring-2 focus:ring-indigo-400"
                placeholder="Second number">
        </div>

        <div class="flex flex-wrap gap-3 mb-5">
            <button data-op="add"
                class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2 rounded-xl shadow">+</button>
            <button data-op="sub"
                class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2 rounded-xl shadow">−</button>
            <button data-op="mul"
                class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2 rounded-xl shadow">×</button>
            <button data-op="div"
                class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2 rounded-xl shadow">÷</button>
        </div>

        <p id="calcOutput" class="font-semibold text-gray-800 italic">
            Result will appear here
        </p>
    </section>

    <!-- Todo -->
    <section class="bg-white shadow-lg rounded-2xl p-6">
        <h2 class="text-xl font-semibold mb-4 text-indigo-600">Daily Task Manager</h2>

        <div class="flex flex-col md:flex-row gap-4 mb-5">
            <input type="text" id="taskText"
                class="border border-gray-300 p-3 rounded-xl w-full focus:ring-2 focus:ring-green-400"
                placeholder="Enter new task">

            <button id="insertTask"
                class="bg-green-500 hover:bg-green-600 text-white font-medium px-5 py-2 rounded-xl shadow transition-all">
                Add Task
            </button>
        </div>

        <div id="taskContainer" class="space-y-3"></div>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
